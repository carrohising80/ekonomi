<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ekonomi</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ========== LOGIN ========== -->
  <div id="login-screen">
    <div id="login-card">
      <div class="login-brand"><span>🪙</span> <strong>Ekonomi</strong></div>
      <h2>Logga in</h2>
      <div class="form-group">
        <label class="form-label">E-postadress</label>
        <input type="email" id="login-email" class="form-input" placeholder="din@epost.se" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">Lösenord</label>
        <input type="password" id="login-password" class="form-input" placeholder="••••••••" autocomplete="current-password">
      </div>
      <p id="login-error" class="login-error hidden"></p>
      <button class="btn btn-primary" id="btn-login" style="width:100%;">Logga in</button>
    </div>
  </div>

  <!-- ========== SIDEBAR ========== -->
  <nav id="sidebar">
    <div class="nav-brand">
      <span class="brand-icon">🪙</span>
      <span class="brand-name">Ekonomi</span>
    </div>

    <ul class="nav-links">
      <li>
        <button class="nav-btn" data-view="dashboard">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
          Översikt
        </button>
      </li>
      <li>
        <button class="nav-btn" data-view="income">
          <svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          Inkomster
        </button>
      </li>
      <li>
        <button class="nav-btn" data-view="fixed">
          <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          Fasta kostnader
        </button>
      </li>
      <li>
        <button class="nav-btn" data-view="variable">
          <svg viewBox="0 0 24 24"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>
          Rörliga kostnader
        </button>
      </li>
      <li>
        <button class="nav-btn" data-view="periodic">
          <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Periodiska
        </button>
      </li>
    </ul>

    <div class="nav-footer">
      <button class="nav-btn" id="btn-export" style="width:100%;">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Exportera JSON
      </button>
      <button class="nav-btn" id="btn-signout" style="width:100%;margin-top:4px;">
        <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Logga ut
      </button>
    </div>
  </nav>

  <!-- ========== MAIN ========== -->
  <main id="main">
    <div id="view-dashboard" class="view"></div>
    <div id="view-income"    class="view"></div>
    <div id="view-fixed"     class="view"></div>
    <div id="view-variable"  class="view"></div>
    <div id="view-periodic"  class="view"></div>
  </main>

  <!-- ========== MODAL ========== -->
  <div id="modal-overlay" class="hidden">
    <div id="modal"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
