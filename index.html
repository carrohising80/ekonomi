<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spendly</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 56 56'%3E%3Cdefs%3E%3ClinearGradient id='w' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%234a90d9'/%3E%3Cstop offset='100%25' stop-color='%232ec4a5'/%3E%3C/linearGradient%3E%3ClinearGradient id='f' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%233ab87a'/%3E%3Cstop offset='100%25' stop-color='%232ec4a5'/%3E%3C/linearGradient%3E%3ClinearGradient id='c' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%23f9d423'/%3E%3Cstop offset='100%25' stop-color='%23d4920a'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect x='6' y='20' width='38' height='26' rx='5' fill='url(%23w)'/%3E%3Crect x='36' y='22' width='10' height='22' rx='4' fill='url(%23f)'/%3E%3Ccircle cx='41' cy='33' r='3' fill='%234cd964' opacity='0.9'/%3E%3Crect x='14' y='8' width='6' height='16' rx='2' fill='%234cd964'/%3E%3Crect x='22' y='4' width='6' height='20' rx='2' fill='%235ac85a'/%3E%3Crect x='30' y='1' width='6' height='23' rx='2' fill='%23f5a623'/%3E%3Ccircle cx='17' cy='33' r='8' fill='url(%23c)'/%3E%3Ctext x='17' y='37' text-anchor='middle' font-size='8' font-weight='bold' fill='white' font-family='Arial'%3E$%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- ========== LOGIN ========== -->
    <div id="loading-screen">
        <div class="loading-spinner"></div>
    </div>

    <div id="login-screen">
        <div id="login-card">
            <div class="login-brand"><span>🪙</span> <strong>Ekonomi</strong></div>
            <h2>Logga in</h2>
            <div class="form-group">
                <label class="form-label">E-postadress</label>
                <input type="email" id="login-email" class="form-input" placeholder="din@epost.se" autocomplete="email">
            </div>
            <div class="form-group">
                <label class="form-label">Lösenord</label>
                <input type="password" id="login-password" class="form-input" placeholder="••••••••"
                    autocomplete="current-password">
            </div>
            <p id="login-error" class="login-error hidden"></p>
            <button class="btn btn-primary" id="btn-login" style="width:100%;">Logga in</button>
        </div>
    </div>

    <!-- ========== SIDEBAR ========== -->
    <nav id="sidebar">
        <div class="nav-brand">
            <svg class="brand-logo" viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg">
              <!-- Wallet body -->
              <rect x="6" y="20" width="38" height="26" rx="5" fill="url(#walletGrad)"/>
              <!-- Wallet flap/clasp -->
              <rect x="36" y="22" width="10" height="22" rx="4" fill="url(#flapGrad)"/>
              <circle cx="41" cy="33" r="3" fill="#4cd964" opacity="0.9"/>
              <!-- Bar chart bars sticking out of wallet top -->
              <rect x="14" y="8" width="6" height="16" rx="2" fill="#4cd964"/>
              <rect x="22" y="4" width="6" height="20" rx="2" fill="#5ac85a"/>
              <rect x="30" y="1" width="6" height="23" rx="2" fill="#f5a623"/>
              <!-- Gold coin -->
              <circle cx="17" cy="33" r="8" fill="url(#coinGrad)"/>
              <circle cx="17" cy="33" r="6" fill="url(#coinInner)" opacity="0.6"/>
              <text x="17" y="37" text-anchor="middle" font-size="8" font-weight="bold" fill="white" font-family="Arial">$</text>
              <defs>
                <linearGradient id="walletGrad" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0%" stop-color="#4a90d9"/>
                  <stop offset="100%" stop-color="#2ec4a5"/>
                </linearGradient>
                <linearGradient id="flapGrad" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0%" stop-color="#3ab87a"/>
                  <stop offset="100%" stop-color="#2ec4a5"/>
                </linearGradient>
                <linearGradient id="coinGrad" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0%" stop-color="#f9d423"/>
                  <stop offset="100%" stop-color="#d4920a"/>
                </linearGradient>
                <linearGradient id="coinInner" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0%" stop-color="#fff"/>
                  <stop offset="100%" stop-color="#f9d423"/>
                </linearGradient>
              </defs>
            </svg>
            <span class="brand-name">Spendly</span>
        </div>

        <div class="sidebar-search">
            <input type="text" id="sidebar-search-input" class="sidebar-search-input" placeholder="Sök kostnad..." autocomplete="off" oninput="handleSearch(this.value)" onfocus="showSearchResults()" />
            <button id="sidebar-search-clear" class="sidebar-search-clear hidden" onclick="clearSearch();event.stopPropagation();" title="Rensa sökning">&#x2715;</button>
            <div id="sidebar-search-results" class="sidebar-search-results hidden"></div>
        </div>

        <ul class="nav-links">
            <li>
                <button class="nav-btn" data-view="dashboard">
                    <svg viewBox="0 0 24 24">
                        <rect x="3" y="3" width="7" height="7" rx="1" />
                        <rect x="14" y="3" width="7" height="7" rx="1" />
                        <rect x="14" y="14" width="7" height="7" rx="1" />
                        <rect x="3" y="14" width="7" height="7" rx="1" />
                    </svg>
                    Översikt
                </button>
            </li>
            <li>
                <button class="nav-btn" data-view="income">
                    <svg viewBox="0 0 24 24">
                        <line x1="12" y1="1" x2="12" y2="23" />
                        <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />
                    </svg>
                    Inkomster
                </button>
            </li>
            <li>
                <button class="nav-btn" data-view="fixed">
                    <svg viewBox="0 0 24 24">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                        <polyline points="14 2 14 8 20 8" />
                        <line x1="16" y1="13" x2="8" y2="13" />
                        <line x1="16" y1="17" x2="8" y2="17" />
                    </svg>
                    Fasta kostnader
                </button>
            </li>
            <li>
                <button class="nav-btn" data-view="variable">
                    <svg viewBox="0 0 24 24">
                        <line x1="12" y1="20" x2="12" y2="10" />
                        <line x1="18" y1="20" x2="18" y2="4" />
                        <line x1="6" y1="20" x2="6" y2="16" />
                    </svg>
                    Rörliga kostnader
                </button>
            </li>
            <li>
                <button class="nav-btn" data-view="periodic">
                    <svg viewBox="0 0 24 24">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
                        <line x1="16" y1="2" x2="16" y2="6" />
                        <line x1="8" y1="2" x2="8" y2="6" />
                        <line x1="3" y1="10" x2="21" y2="10" />
                    </svg>
                    Periodiska
                </button>
            </li>
        </ul>

        <div class="nav-footer">
            <button class="nav-btn" id="btn-clear-month" style="width:100%;color:var(--danger);">
                <svg viewBox="0 0 24 24">
                    <polyline points="3 6 5 6 21 6"/>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
                </svg>
                Töm månad
            </button>
            <button class="nav-btn" id="btn-export" style="width:100%;margin-top:4px;">
                <svg viewBox="0 0 24 24">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                    <polyline points="7 10 12 15 17 10" />
                    <line x1="12" y1="15" x2="12" y2="3" />
                </svg>
                Exportera JSON
            </button>
            <button class="nav-btn" id="btn-signout" style="width:100%;margin-top:4px;">
                <svg viewBox="0 0 24 24">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                    <polyline points="16 17 21 12 16 7" />
                    <line x1="21" y1="12" x2="9" y2="12" />
                </svg>
                Logga ut
            </button>
        </div>
    </nav>

    <!-- ========== MAIN ========== -->
    <main id="main">
        <div id="view-dashboard" class="view"></div>
        <div id="view-income" class="view"></div>
        <div id="view-fixed" class="view"></div>
        <div id="view-variable" class="view"></div>
        <div id="view-periodic" class="view"></div>
    </main>

    <!-- ========== MODAL ========== -->
    <div id="modal-overlay" class="hidden">
        <div id="modal"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
